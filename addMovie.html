<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Film | Student Film Database</title>
    <link rel="stylesheet" href="/cmps480/addMovie.css">
</head>
<body>

    <!-- Back to Film Database Button-->
    <div class="back-link-container">
        <a href="index.html" class="back-btn">← Back to Film Database</a>
    </div>

    <div class="container">
        <div class="form-container">
            <h1>Add Film Project</h1>

                <form class="form">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" placeholder="Enter Film Title" required>

                    <label for="genre">Genre:</label>
                    <input type="text" id="genre" name="genre" placeholder="Enter Film Genre" required>
                    
                    <label for="year">Year:</label>
                    <input type="text" id="year" name="year" placeholder="Enter Year" required>

                    <label for="time">Run Time:</label>
                    <input type="text" id="time" name="time" placeholder="Enter Run Time in Minutes" required>

                    <h3>Crew</h3>
                    <div id="crewContainer"></div>

                    <button type="button" onclick="addCrewRow()">+ Add Crew Member</button>
                    
                    <div class="button-container">
                        <button type="submit" class="submit-btn">Submit</button>
                    </div>
                </form>
            </div>
        </div>

        <!--Link to js file-->
        <script src="/cmps480/addMovie.js"></script>
        
</body>
</html>
