<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./genres.css">
    <title>Genre Popularity</title>
</head>
<body>

<h2>Genre Popularity Analytics (Student Participation)</h2>

<canvas id="genreChart" width="400" height="200"></canvas>

<!--Chart.js CDN-->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch('http://ncasey.it.pointpark.edu:3000/analytics/genres')
  .then(res => res.json())
  .then(result => {
    const data = result.data;

    console.log(data);

    const labels = data.map(item => item.genre);
    const values = data.map(item => item.total_entries);

    const ctx = document.getElementById('genreChart').getContext('2d');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Students per Genre',
          data: values
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: {
            display: true,
            text: 'Crew Assignments by Genre'
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  })
  .catch(error => {
    console.error('Error loading data:', error);
  });
</script>

</body>
</html>
