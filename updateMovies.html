<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/cmps480/updateMovies.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Update Film Project</title>
</head>
<body>

    <!-- Back to Film Database Button -->
    <div class="back-link-container">
        <a href="index.html" class="back-btn">← Back to Film Database</a>
    </div>

    <div class="container">
        <div class="form-container">
            <h2>Update Film Project</h2>
            <form class="form">
                <label for="filmId">Id:</label>
                <input type="number" id="filmId" name="id" placeholder="Enter Film ID" required>

                <label for="title">Title:</label>
                <input type="text" id="title" name="title" placeholder="Enter Film Title" required>

                <!-- Added the Genre field like AddMovie -->
                <label for="genre">Genre:</label>
                <input type="text" id="genre" name="genre" placeholder="Enter Film Genre" required>

                <label for="year">Year:</label>
                <input type="text" id="year" name="year" placeholder="Enter Year" required>

                <label for="runTime">Run Time:</label>
                <input type="text" id="runTime" name="runTime" placeholder="Enter Run Time in Minutes" required>

                <label for="director">Director:</label>
                <input type="text" id="director" name="director" placeholder="Enter Director Name" required>

                <label for="producer">Producer:</label>
                <input type="text" id="producer" name="producer" placeholder="Enter Producer Name" required>

                <label for="screenWriter">Screenwriter:</label>
                <input type="text" id="screenWriter" name="screenWriter" placeholder="Enter Screenwriter Name" required>

                <label for="cinematographer">Cinematographer:</label>
                <input type="text" id="cinematographer" name="cinematographer" placeholder="Enter Cinematographer Name" required>

                <label for="editor">Editor:</label>
                <input type="text" id="editor" name="editor" placeholder="Enter Editor Name" required>

                <div class="button-container">
                    <button type="submit" class="submit-btn">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.2/dist/purify.min.js"></script>
</body>
</html>
